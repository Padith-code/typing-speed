<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Dosis:wght@200..800&family=Sora:wght@100..800&display=swap" rel="stylesheet">
     <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
     <link rel="stylesheet" href="styles.css" />
     <title>Frontend Mentor | Typing Speed Test</title>
  </head>
  <body>
    <main>
       <div class="decor decor-pink-dots">
          <svg width="60" height="40" viewBox="0 0 60 40">
            <circle cx="5" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="15" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="25" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="35" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="45" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="55" cy="5" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="5" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="15" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="25" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="35" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="45" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="55" cy="15" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="5" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="15" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="25" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="35" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="45" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="55" cy="25" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="5" cy="35" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="15" cy="35" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="25" cy="35" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="35" cy="35" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="45" cy="35" r="2.5" fill="#f472b6" opacity="0.7" /><circle cx="55" cy="35" r="2.5" fill="#f472b6" opacity="0.7" />
           </svg>
       </div>

       <div class="decor decor-pink-arrow">
          <svg width="60" height="80" viewBox="0 0 60 80" fill="none">
            <polyline points="10,10 35,40 10,70" stroke="#f472b6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
            <polyline points="28,10 53,40 28,70" stroke="#f472b6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45" />
          </svg>
       </div>

       <div class="decor decor-teal-lines">
          <svg width="90" height="80" viewBox="0 0 90 80" fill="none">
            <line x1="0" y1="70" x2="70" y2="0" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.85" />
            <line x1="18" y1="80" x2="88" y2="10" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.55" />
            <line x1="-10" y1="52" x2="50" y2="-8" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.35" />
          </svg>
       </div>

       <div class="decor decor-teal-dots">
          <svg width="60" height="50" viewBox="0 0 60 50">
            <circle cx="5" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="15" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="25" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="35" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="45" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="55" cy="5" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="5" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="15" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="25" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="35" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="45" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="55" cy="15" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="5" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="15" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="25" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="35" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="45" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="55" cy="25" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="5" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="15" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="25" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="35" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="45" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="55" cy="35" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="5" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="15" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="25" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="35" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="45" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" /><circle cx="55" cy="45" r="2.5" fill="#14b8a6" opacity="0.7" />
          </svg>
       </div>

       <div class="card">
          <div class="header">
            <div class="header-left">
              <div>
                <img class="logo-name" src="assets/images/logo-large.svg" alt="Typing Test Logo" />
              </div>
            </div>
            <div class="personal-best">
              <img src="assets/images/icon-personal-best.svg" alt="PB Icon" />
              Personal best: <strong class="js-personal-best">0 WPM</strong>
            </div>
          </div>

          <div class="stats-row">
            <div class="stats">
              <span class="stat-label">WPM:</span>
              <span class="stat-value js-stat-value">0</span>
              <span class="stat-sep">|</span>
              <span class="stat-label">Accuracy:</span>
              <span class="stat-accuracy js-stat-accuracy">100%</span>
              <span class="stat-sep">|</span>
              <span class="stat-label">Time:</span>
              <span class="stat-time js-stat-time">0:60</span>
            </div>

            <div class="controls">
              <div class="control-group">
                <span class="control-label">Difficulty:</span>
                <div class="pill-group">
                  <button class="pill active js-easy-btn">Easy</button>
                  <button class="pill js-medium-btn">Medium</button>
                  <button class="pill js-hard-btn">Hard</button>
                </div>
              </div>
              <div class="control-group">
                <span class="control-label">Mode:</span>
                <div class="pill-group">
                  <button class="pill active js-timed-btn">Timed (60s)</button>
                  <button class="pill js-passage-btn">Passage</button>
                </div>
              </div>
            </div>
          </div>

          <div class="passage-area">
            <p class="passage js-passage">
                </p>
          </div>

          <div class="divider"></div>

          <div class="restart-area">
            <button class="restart-btn js-restart-btn">
              Restart Test
              <img class="restart-icon" src="assets/images/icon-restart.svg" alt="Restart" />
            </button>
          </div>
       </div>

       <div class="celebration-modal js-celebration-modal">
          <div class="celebration-overlay"></div>
          <div class="celebration-content">
            <img class="celebration-confetti" src="assets/images/pattern-confetti.svg" alt="" />
            <img class="celebration-star celebration-star-1" src="assets/images/pattern-star-1.svg" alt="" />
            <img class="celebration-star celebration-star-2" src="assets/images/pattern-star-2.svg" alt="" />
            
            <div class="celebration-inner">
              <div class="celebration-icon-wrapper">
                <img class="celebration-icon celebration-completed" src="assets/images/icon-completed.svg" alt="Completed" />
                <img class="celebration-icon celebration-pb-icon js-celebration-pb-icon" src="assets/images/icon-new-pb.svg" alt="New Personal Best" style="display: none;" />
              </div>
              
              <h2 class="celebration-title">Finished!</h2>
              <p class="celebration-subtitle">You completed the passage</p>
              
              <div class="celebration-stats">
                <div class="celebration-stat">
                  <span class="celebration-stat-label">Words per minute</span>
                  <span class="celebration-stat-value js-celebration-wpm">0</span>
                </div>
                <div class="celebration-stat-divider"></div>
                <div class="celebration-stat">
                  <span class="celebration-stat-label">Accuracy</span>
                  <span class="celebration-stat-value js-celebration-accuracy">0%</span>
                </div>
              </div>
              
              <button class="celebration-btn js-celebration-btn">Go again</button>
            </div>
          </div>
       </div>
    </main>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Padith Ndamba Biembe</a>.
    </footer>
    <script type="module" src="scripts.js"></script>
  </body>
</html>
